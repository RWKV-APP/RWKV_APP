name: zone
version: 4.3.6
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-zone: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.zone # adjust accordingly to your app name

apps:
  zone:
    command: zone
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-zone
parts:
  zone:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
