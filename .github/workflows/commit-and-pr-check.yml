name: Build Check

# 触发机制：
# 只有在有人向 main 或 dev 分支推送代码(commit)时触发
# 这样保证了每次合并或直接提交都会被检查
on:
  push:
    branches: [main, dev, ci_dev]
  # 也可以加上 PR 触发，双重保险 (建议加上)
  pull_request:
    branches: [main, dev, ci_dev]

# 资源优化：
# 如果同一个分支短时间内连续提交，自动取消上一次正在跑的，只跑最新的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space-action@v1.3.1
        with:
          android: false
          tool-cache: false
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: true
          large-packages: true

      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: "stable"
          cache: true

      - name: Setup Tools
        run: |
          cd tools
          dart pub get

      - name: Override Dependency Path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: Create dummy .env
        run: echo "DUMMY_ENV=true" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Decrypt filter.txt
        run: |
          mkdir -p assets

          if [ -n "${{ secrets.FILTER_DECRYPT_PASS }}" ]; then
            echo "🔐 发现解密密码，正在还原近 200KB 的 filter.txt..."
            
            # 使用 gpg 解密
            # --quiet: 减少日志输出
            # --batch --yes: 非交互模式
            # --passphrase: 传入密码
            # --output: 输出路径
            # 最后的参数是加密文件的路径
            gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.FILTER_DECRYPT_PASS }}" \
            --output assets/filter.txt assets/filter.txt.gpg

          else
            echo "⚠️ 未找到密码 (可能是 Fork 仓库)，正在生成占位文件..."
            echo "" > assets/filter.txt
          fi

          ls -lh assets/filter.txt

      - name: Try Build APK (Debug)
        env:
          SENTRY_SKIP_UPLOAD: true
        run: flutter build apk --debug --target-platform android-arm64
