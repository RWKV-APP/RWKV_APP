name: Build Check

on:
  push:
    branches: [main, dev, ci_dev]
  pull_request:
    branches: [main, dev, ci_dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-code:
    name: 🛡️ Code & Build Check
    runs-on: ubuntu-latest

    steps:
      # 1. 清理空间
      - name: 🧹 Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          tool-cache: false
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: true
          large-packages: true

      # 2. 拉取代码
      - name: 📥 Checkout main repo
        uses: actions/checkout@v4

      - name: 📦 Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      # 3. 环境准备 (Java + Flutter)
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: "stable"
          cache: true

      # 4. 初始化工具 (这里用了 ::group:: 语法，让日志折叠起来)
      - name: 🛠️ Setup Tools
        run: |
          echo "::group::🚀 Initializing Tools..."
          cd tools
          dart pub get
          echo "✅ Tools initialized!"
          echo "::endgroup::"

      # 5. 生成配置文件 (带颜色的输出)
      - name: 📝 Generate Config Files
        run: |
          # 定义颜色变量
          GREEN='\033[0;32m'
          NC='\033[0m' # No Color

          echo "::group::🔧 Configuring Dependencies & Env"

          # 1. Override Path
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml
          echo -e "${GREEN}✅ pubspec_overrides.yaml created${NC}"

          # 2. Dummy Env
          echo "DUMMY_ENV=true" > .env
          echo -e "${GREEN}✅ .env created${NC}"

          echo "::endgroup::"

      # 6. 安装依赖
      - name: 🧶 Install Dependencies
        run: flutter pub get

      # 7. 静态分析
      - name: 🔍 Run Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 8. 解密文件 (逻辑没变，加了日志提示)
      - name: 🔐 Decrypt Sensitive Assets
        run: |
          mkdir -p assets

          # 定义颜色
          YELLOW='\033[1;33m'
          CYAN='\033[0;36m'
          NC='\033[0m'

          echo "::group::🔓 Decryption Process"

          if [ -n "${{ secrets.FILTER_DECRYPT_PASS }}" ]; then
            echo -e "${CYAN}🔐 Secret found! Decrypting filter.txt...${NC}"
            
            gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.FILTER_DECRYPT_PASS }}" \
            --output assets/filter.txt assets/filter.txt.gpg
            
            FILE_SIZE=$(ls -lh assets/filter.txt | awk '{print $5}')
            echo -e "✅ Decryption success. File size: ${GREEN}$FILE_SIZE${NC}"
          else
            echo -e "${YELLOW}⚠️ Secret not found (Forked repo?). Creating placeholder...${NC}"
            echo "" > assets/filter.txt
          fi

          echo "::endgroup::"

      # 9. 构建 APK
      - name: 🏗️ Build APK (Debug - ARM64)
        env:
          SENTRY_SKIP_UPLOAD: true
        run: |
          echo "::notice title=Build Started::Building debug APK for Android ARM64..."
          flutter build apk --debug --target-platform android-arm64

      # 10. (新增) 生成构建摘要，显示在 Action 首页
      - name: 🎉 Build Summary
        if: success()
        run: |
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "We successfully compiled the APK." >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Android (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`build/app/outputs/flutter-apk/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
