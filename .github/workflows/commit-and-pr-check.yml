name: Build Check

on:
  push:
    branches: [main, dev, ci_dev]
  pull_request:
    branches: [main, dev, ci_dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-code:
    name: 🛡️ Code & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 🧹 Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          tool-cache: false
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: true
          large-packages: true

      - name: 📥 Checkout main repo
        uses: actions/checkout@v4

      - name: 📦 Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: 🛠️ Setup Tools
        run: |
          echo "::group::🚀 Initializing Tools..."
          cd tools
          dart pub get
          echo "✅ Tools initialized!"
          echo "::endgroup::"

      - name: 📝 Generate Config Files
        run: |
          echo "::group::🔧 Configuring Dependencies & Env"

          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml
          echo "✅ pubspec_overrides.yaml created"

          echo "DUMMY_ENV=true" > .env
          echo "✅ .env created"

          echo "::endgroup::"

      - name: 🧶 Install Dependencies
        run: flutter pub get

      - name: 🔍 Run Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 🔐 Decrypt Sensitive Assets
        run: |
          mkdir -p assets

          echo "::group::🔓 Decryption Process"

          if [ -n "${{ secrets.FILTER_DECRYPT_PASS }}" ]; then
            echo "🔐 Secret found! Decrypting filter.txt..."
            
            gpg --quiet --batch --yes --decrypt --passphrase="${{ secrets.FILTER_DECRYPT_PASS }}" \
            --output assets/filter.txt assets/filter.txt.gpg
            
            FILE_SIZE=$(ls -lh assets/filter.txt | awk '{print $5}')
            echo "✅ Decryption success. File size: $FILE_SIZE"
          else
            echo "⚠️ Secret not found (Forked repo?). Creating placeholder..."
            echo "" > assets/filter.txt
          fi

          echo "::endgroup::"

      - name: 🏗️ Build APK (Debug - ARM64)
        env:
          SENTRY_SKIP_UPLOAD: true
        run: |
          echo "::notice title=Build Started::Building debug APK for Android ARM64..."
          flutter build apk --debug --target-platform android-arm64

      - name: 🎉 Build Summary
        if: success()
        run: |
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "We successfully compiled the APK." >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Android (ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`build/app/outputs/flutter-apk/app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
