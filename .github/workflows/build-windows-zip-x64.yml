name: Windows zip x64

run-name: ${{ github.ref_name }} Windows zip x64

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows-zip-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: "stable"
          cache: true

      - name: Override dependency path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: 📝 Create .env file
        shell: pwsh
        run: |
          Write-Host "::group::📝 Creating .env file"
          "x-api-key=${{ secrets.X_API_KEY }}" | Out-File -FilePath .env -Encoding utf8 -NoNewline
          Write-Host "✅ .env created"
          Write-Host "::endgroup::"

      - name: 🔐 Decrypt Sensitive Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          Write-Host "::group::🔓 Decryption Process"
          if ("${{ secrets.FILTER_DECRYPT_PASS }}") {
            Write-Host "🔐 Secret found! Decrypting filter.txt..."
            # 使用 gpg 解密（需要先安装 gpg）
            # 如果 gpg 不可用，创建占位符
            if (Get-Command gpg -ErrorAction SilentlyContinue) {
              $passphrase = "${{ secrets.FILTER_DECRYPT_PASS }}"
              # 使用 --passphrase 参数，而不是 --passphrase-fd（Windows 上更可靠）
              gpg --quiet --batch --yes --decrypt --passphrase="$passphrase" --output assets/filter.txt assets/filter.txt.gpg
              if ($LASTEXITCODE -eq 0 -and (Test-Path assets/filter.txt)) {
                $fileSize = (Get-Item assets/filter.txt).Length
                Write-Host "✅ Decryption success. File size: $fileSize bytes"
              } else {
                Write-Host "⚠️ Decryption failed. Creating placeholder..."
                "" | Out-File -FilePath assets/filter.txt -Encoding utf8
              }
            } else {
              Write-Host "⚠️ gpg not found. Creating placeholder..."
              "" | Out-File -FilePath assets/filter.txt -Encoding utf8
            }
          } else {
            Write-Host "⚠️ Secret not found. Creating placeholder..."
            "" | Out-File -FilePath assets/filter.txt -Encoding utf8
          }
          Write-Host "::endgroup::"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: 🧹 Remove arm64/aarch64 DLLs
        shell: pwsh
        run: |
          echo "::group::🧹 Cleaning up arm64/aarch64 DLLs"
          $sourceDir = "build/windows/x64/runner/Release"
          if (Test-Path $sourceDir) {
            # 删除 arm64/aarch64 相关的 DLL 文件
            $filesToRemove = @(
              "*arm64*.dll",
              "*aarch64*.dll",
              "libomp140.aarch64.dll",
              "rwkv_mobile-arm64.dll"
            )
            $removedCount = 0
            foreach ($pattern in $filesToRemove) {
              $files = Get-ChildItem -Path $sourceDir -Filter $pattern -ErrorAction SilentlyContinue
              foreach ($file in $files) {
                Remove-Item -Path $file.FullName -Force
                Write-Host "✅ Removed: $($file.Name)"
                $removedCount++
              }
            }
            if ($removedCount -eq 0) {
              Write-Host "ℹ️ No arm64/aarch64 DLLs found to remove"
            } else {
              Write-Host "✅ Removed $removedCount arm64/aarch64 DLL file(s)"
            }
          } else {
            Write-Host "🚧 Source directory not found: $sourceDir"
          }
          echo "::endgroup::"

      - name: Create zip archive
        id: create-zip
        shell: pwsh
        run: |
          echo "::group::📦 Creating zip Archive"
          $versionLine = Get-Content pubspec.yaml | Select-String "^version:"
          $version = ($versionLine -replace "version:\s*", "").Split("+")[0]
          $buildNumber = ($versionLine -replace ".*\+", "")
          if ([string]::IsNullOrEmpty($buildNumber)) { $buildNumber = "1" }

          $zipName = "rwkv_chat_${version}_${buildNumber}_windows-x64.zip"
          $sourceDir = "build/windows/x64/runner/Release"
          $zipPath = "build/windows/x64/runner/$zipName"

          if (-not (Test-Path $sourceDir)) { echo "😡 Source not found"; exit 1 }
          Compress-Archive -Path "$sourceDir/*" -DestinationPath $zipPath -Force

          echo "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # ✅ 修复：不生成日志
          generate_release_notes: false
          files: ${{ steps.create-zip.outputs.zip_path }}

      - name: 🛠️ Setup Python
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: pip install huggingface_hub

      - name: 📤 Upload to HuggingFace
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ENDPOINT: ${{ secrets.HF_ENDPOINT || 'https://huggingface.co' }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID || 'rwkv-app/RWKV-Chat' }}
        run: |
          Write-Host "::group::📤 Uploading to HuggingFace"
          python scripts/upload_to_hf.py `
            --repo-id "$env:HF_REPO_ID" `
            --file "${{ steps.create-zip.outputs.zip_path }}" `
            --path-in-repo "windows-x64/${{ steps.create-zip.outputs.zip_name }}" `
            --hf-token "$env:HF_TOKEN" `
            --hf-endpoint "$env:HF_ENDPOINT"
          Write-Host "✅ Upload completed"
          Write-Host "::endgroup::"
