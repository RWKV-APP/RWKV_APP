name: Windows zip x64

run-name: ${{ github.ref_name }} Windows zip x64

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      zip_name: ${{ steps.meta.outputs.zip_name }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Extract version metadata
        id: meta
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION=$(echo "$VERSION_LINE" | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed 's/.*+//')
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi

          ZIP_NAME="rwkv_chat_${VERSION}_${BUILD_NUMBER}_windows-x64.zip"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            SHOULD_PUBLISH="true"
          else
            SHOULD_PUBLISH="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Override dependency path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: Create .env file
        uses: ./.github/actions/create-env-windows
        with:
          x_api_key: ${{ secrets.X_API_KEY }}

      - name: Decrypt sensitive assets
        uses: ./.github/actions/decrypt-assets-windows
        with:
          filter_decrypt_pass: ${{ secrets.FILTER_DECRYPT_PASS }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Remove arm64/aarch64 DLLs
        shell: pwsh
        run: |
          $sourceDir = "build/windows/x64/runner/Release"
          if (Test-Path $sourceDir) {
            $filesToRemove = @(
              "*arm64*.dll",
              "*aarch64*.dll",
              "libomp140.aarch64.dll",
              "rwkv_mobile-arm64.dll"
            )
            $removedCount = 0
            foreach ($pattern in $filesToRemove) {
              $files = Get-ChildItem -Path $sourceDir -Filter $pattern -ErrorAction SilentlyContinue
              foreach ($file in $files) {
                Remove-Item -Path $file.FullName -Force
                Write-Host "Removed: $($file.Name)"
                $removedCount++
              }
            }
            Write-Host "Removed $removedCount arm64/aarch64 DLL file(s)"
          }

      - name: Create models directory
        shell: pwsh
        run: |
          $modelsDir = "build\windows\x64\runner\Release\models"
          New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
          New-Item -ItemType File -Force -Path "$modelsDir\.gitkeep" | Out-Null

      - name: Create zip archive
        id: create-zip
        shell: pwsh
        env:
          ZIP_NAME: ${{ needs.setup.outputs.zip_name }}
        run: |
          $zipName = $env:ZIP_NAME
          $sourceDir = "build/windows/x64/runner/Release"
          $zipPath = "build/windows/x64/runner/$zipName"

          if (-not (Test-Path $sourceDir)) { Write-Host "Source not found"; exit 1 }
          Compress-Archive -Path "$sourceDir/*" -DestinationPath $zipPath -Force

          echo "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip-x64
          path: ${{ steps.create-zip.outputs.zip_path }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: "*.zip"

  upload-hf:
    name: Upload to HuggingFace
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload script
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/upload_to_hf.py
          sparse-checkout-cone-mode: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip-x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ENDPOINT: ${{ secrets.HF_ENDPOINT || 'https://huggingface.co' }}
          HF_DATASETS_ID: ${{ secrets.HF_DATASETS_ID || 'HaloWang/rwkv-chat' }}
          ZIP_NAME: ${{ needs.setup.outputs.zip_name }}
        run: |
          python scripts/upload_to_hf.py \
            --repo-id "$HF_DATASETS_ID" \
            --file "$ZIP_NAME" \
            --path-in-repo "windows-x64/$ZIP_NAME" \
            --hf-token "$HF_TOKEN" \
            --hf-endpoint "$HF_ENDPOINT"
