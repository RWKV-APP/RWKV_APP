name: Windows Installer x64

run-name: ${{ github.ref_name }} Windows Installer x64

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish installer assets to (e.g. 4.0.6). Leave empty to skip release/upload."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      installer_name: ${{ steps.meta.outputs.installer_name }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Extract version metadata
        id: meta
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION=$(echo "$VERSION_LINE" | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed 's/.*+//')
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi

          INSTALLER_NAME="rwkv_chat_${VERSION}_${BUILD_NUMBER}_windows-x64-setup"

          if [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ inputs.release_tag }}" != "" ]]; then
            SHOULD_PUBLISH="true"
          else
            SHOULD_PUBLISH="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "installer_name=$INSTALLER_NAME" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Override dependency path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: Create .env file
        uses: ./.github/actions/create-env-windows
        with:
          x_api_key: ${{ secrets.X_API_KEY }}

      - name: Decrypt sensitive assets
        uses: ./.github/actions/decrypt-assets-windows
        with:
          filter_decrypt_pass: ${{ secrets.FILTER_DECRYPT_PASS }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Remove arm64/aarch64 DLLs
        shell: pwsh
        run: |
          $sourceDir = "build\windows\x64\runner\Release"
          if (Test-Path $sourceDir) {
            $filesToRemove = @(
              "*arm64*.dll",
              "*aarch64*.dll",
              "libomp140.aarch64.dll",
              "rwkv_mobile-arm64.dll"
            )
            $removedCount = 0
            foreach ($pattern in $filesToRemove) {
              $files = Get-ChildItem -Path $sourceDir -Filter $pattern -ErrorAction SilentlyContinue
              foreach ($file in $files) {
                Remove-Item -Path $file.FullName -Force
                Write-Host "Removed: $($file.Name)"
                $removedCount++
              }
            }
            Write-Host "Removed $removedCount arm64/aarch64 DLL file(s)"
          }

      - name: Create models directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "build\windows\x64\runner\Release\models" | Out-Null

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes

      - name: Create installer
        id: create-installer
        shell: pwsh
        env:
          INSTALLER_NAME: ${{ needs.setup.outputs.installer_name }}
        run: |
          $installerName = $env:INSTALLER_NAME
          $installerFilename = "$installerName.exe"
          $version = "${{ needs.setup.outputs.version }}"
          $sourceDir = "build\windows\x64\runner\Release"
          $outputDir = "build\windows\installer"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $issContent = @"
          [Setup]
          AppId={{B8263530-8329-4360-844C-964687593675}
          AppName=RWKV Chat
          AppVersion=$version
          AppPublisher=RWKV Community
          DefaultDirName={autopf}\RWKV Chat
          DisableProgramGroupPage=yes
          PrivilegesRequired=admin
          OutputDir=$outputDir
          OutputBaseFilename=$installerName
          Compression=lzma
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "$sourceDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Registry]
          Root: HKLM; Subkey: "Software\Microsoft\Windows NT\CurrentVersion\AppCompatFlags\Layers"; ValueType: string; ValueName: "{app}\RWKV_Chat.exe"; ValueData: "~ RUNASADMIN"; Flags: uninsdeletevalue

          [Icons]
          Name: "{autoprograms}\RWKV Chat"; Filename: "{app}\RWKV_Chat.exe"
          Name: "{autodesktop}\RWKV Chat"; Filename: "{app}\RWKV_Chat.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\RWKV_Chat.exe"; Description: "{cm:LaunchProgram,RWKV Chat}"; Flags: nowait postinstall skipifsilent runascurrentuser
          "@

          $issContent | Out-File -FilePath "setup.iss" -Encoding ASCII
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

          $installerPath = Join-Path $outputDir $installerFilename
          if (Test-Path $installerPath) {
            echo "installer_path=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else { exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-x64
          path: ${{ steps.create-installer.outputs.installer_path }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: "*.exe"

  upload-hf:
    name: Upload to HuggingFace
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload script
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/upload_to_hf.py
          sparse-checkout-cone-mode: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ENDPOINT: ${{ secrets.HF_ENDPOINT || 'https://huggingface.co' }}
          HF_DATASETS_ID: ${{ secrets.HF_DATASETS_ID || 'HaloWang/rwkv-chat' }}
          INSTALLER_NAME: ${{ needs.setup.outputs.installer_name }}
        run: |
          python scripts/upload_to_hf.py \
            --repo-id "$HF_DATASETS_ID" \
            --file "${INSTALLER_NAME}.exe" \
            --path-in-repo "windows-x64-installer/${INSTALLER_NAME}.exe" \
            --hf-token "$HF_TOKEN" \
            --hf-endpoint "$HF_ENDPOINT"
