name: Linux x64

run-name: ${{ github.ref_name }} Linux x64

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      archive_name: ${{ steps.meta.outputs.archive_name }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Extract version metadata
        id: meta
        run: |
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          VERSION=$(echo "$VERSION_LINE" | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed 's/.*+//')
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi

          ARCHIVE_NAME="rwkv_chat_${VERSION}_${BUILD_NUMBER}_linux-x64.tar.gz"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            SHOULD_PUBLISH="true"
          else
            SHOULD_PUBLISH="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libcurl4-openssl-dev

      - name: Override dependency path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
            echo "  proxy_setting_android:" >> pubspec_overrides.yaml
            echo "    git:" >> pubspec_overrides.yaml
            echo "      url: https://github.com/dengzii/proxy_setting.git" >> pubspec_overrides.yaml
            echo "      path: packages/proxy_setting_android" >> pubspec_overrides.yaml
            echo "      ref: main" >> pubspec_overrides.yaml
            echo "  rwkv_downloader:" >> pubspec_overrides.yaml
            echo "    git:" >> pubspec_overrides.yaml
            echo "      url: https://github.com/RWKV-APP/rwkv_downloader.git" >> pubspec_overrides.yaml
            echo "      ref: v1" >> pubspec_overrides.yaml
            echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
            echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: Create .env file
        uses: ./.github/actions/create-env
        with:
          x_api_key: ${{ secrets.X_API_KEY }}

      - name: Decrypt sensitive assets
        uses: ./.github/actions/decrypt-assets
        with:
          filter_decrypt_pass: ${{ secrets.FILTER_DECRYPT_PASS }}

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Flutter setup
        run: flutter doctor -v

      - name: Build Linux x64
        run: flutter build linux --release --target-platform linux-x64

      - name: Remove aarch64 libraries
        run: |
          LIB_DIR="build/linux/x64/release/bundle/lib"
          if [ -d "$LIB_DIR" ]; then
            REMOVED_COUNT=0
            for file in "$LIB_DIR"/*aarch64*.so "$LIB_DIR"/*arm64*.so; do
              if [ -f "$file" ]; then
                echo "Removing: $(basename "$file")"
                rm -f "$file"
                REMOVED_COUNT=$((REMOVED_COUNT + 1))
              fi
            done
            echo "Removed $REMOVED_COUNT aarch64 library file(s)"
          fi

      - name: Create archive
        id: create-archive
        env:
          ARCHIVE_NAME: ${{ needs.setup.outputs.archive_name }}
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$ARCHIVE_NAME" *

          ARCHIVE_FULL_PATH="$(pwd)/$ARCHIVE_NAME"
          echo "archive_path=$ARCHIVE_FULL_PATH" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-archive
          path: ${{ steps.create-archive.outputs.archive_path }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: "*.tar.gz"

  upload-hf:
    name: Upload to HuggingFace
    needs: [setup, build]
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload script
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/upload_to_hf.py
          sparse-checkout-cone-mode: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-archive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ENDPOINT: ${{ secrets.HF_ENDPOINT || 'https://huggingface.co' }}
          HF_DATASETS_ID: ${{ secrets.HF_DATASETS_ID || 'HaloWang/rwkv-chat' }}
          ARCHIVE_NAME: ${{ needs.setup.outputs.archive_name }}
        run: |
          python scripts/upload_to_hf.py \
            --repo-id "$HF_DATASETS_ID" \
            --file "$ARCHIVE_NAME" \
            --path-in-repo "linux-x64/$ARCHIVE_NAME" \
            --hf-token "$HF_TOKEN" \
            --hf-endpoint "$HF_ENDPOINT"
