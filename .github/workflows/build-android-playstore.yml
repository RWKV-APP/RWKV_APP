name: Android Play Store

run-name: ${{ github.ref_name }} Android Play Store

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-android-playstore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout rwkv_mobile_flutter dependency
        uses: actions/checkout@v4
        with:
          repository: MollySophia/rwkv_mobile_flutter
          ref: dev
          path: rwkv_mobile_flutter
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Override dependency path
        run: |
          echo "dependency_overrides:" > pubspec_overrides.yaml
          echo "  rwkv_mobile_flutter:" >> pubspec_overrides.yaml
          echo "    path: ./rwkv_mobile_flutter" >> pubspec_overrides.yaml

      - name: 🐍 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 📦 Install fastlane dependencies
        run: |
          cd fastlane
          bundle install

      - name: 🔧 Fastlane: Prepare environment
        run: |
          echo "::group::🔧 Fastlane: Environment preparation"
          cd fastlane
          # 执行环境替换（chat 环境）
          bundle exec fastlane global_replace env:chat
          echo "::endgroup::"

      - name: 📦 Install tools dependencies
        run: |
          echo "::group::📦 Installing tools dependencies"
          cd tools
          dart pub get
          echo "✅ Tools dependencies installed"
          echo "::endgroup::"

      - name: 🎨 Build assets (via fastlane)
        run: |
          echo "::group::🎨 Building assets"
          cd fastlane
          # 构建 assets（包括生成版本号图片、启动画面、应用图标）
          bundle exec fastlane build_assets
          echo "✅ Assets built successfully"
          echo "::endgroup::"

      - name: 🧶 Install Flutter dependencies
        run: flutter pub get

      - name: 🔍 Verify Flutter setup
        run: flutter doctor -v

      - name: 🏗️ Build aab (arm64 via fastlane)
        run: |
          echo "::group::🏗️ Building Android AAB"
          cd fastlane
          bundle exec fastlane run_flutter_build_aab
          echo "::endgroup::"

      - name: 🔐 Sign AAB with JKS
        run: |
          echo "::group::🔐 Signing AAB"

          # 1. 从 Secret 恢复 JKS 文件
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          chmod 600 android/app/keystore.jks

          # 2. 使用 jarsigner 签名 AAB
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "$AAB_PATH" \
            "${{ secrets.ANDROID_KEY_ALIAS }}"

          # 3. 验证签名
          jarsigner -verify -verbose -certs "$AAB_PATH" && echo "✅ AAB signed and verified successfully"

          # 4. 清理 JKS 文件
          rm -f android/app/keystore.jks

          echo "::endgroup::"

      - name: 📝 Rename aab File
        id: rename-aab
        run: |
          echo "::group::📝 Renaming aab File"

          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(grep "^version:" pubspec.yaml | sed 's/.*+//')

          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="1"; fi
          if [ -z "$VERSION" ]; then echo "😡 Failed to extract version"; exit 1; fi

          # 命名格式: rwkv_chat_1.0.0_1_android-arm64.aab
          NEW_AAB_NAME="rwkv_chat_${VERSION}_${BUILD_NUMBER}_android-arm64.aab"
          OLD_AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          NEW_AAB_PATH="build/app/outputs/bundle/release/${NEW_AAB_NAME}"

          mv "$OLD_AAB_PATH" "$NEW_AAB_PATH"

          echo "aab_path=${NEW_AAB_PATH}" >> $GITHUB_OUTPUT
          echo "aab_name=${NEW_AAB_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

          echo "✅ Renamed to: ${NEW_AAB_NAME}"
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: false
          # 把编译好的 aab 上传上去（使用重命名后的文件）
          files: ${{ steps.rename-aab.outputs.aab_path }}
