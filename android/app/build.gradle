plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load signing configuration
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('app/signing.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.rwkvzone.chat"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.rwkvzone.chat"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    packaging {
        jniLibs {
            excludes += ["**/x86/**", "**/x86_64/**", "**/armeabi-v7a/**"]
        }
    }

    signingConfigs {
        debug {
            keyAlias keystoreProperties['debug.keyAlias'] ?: 'androiddebugkey'
            keyPassword keystoreProperties['debug.keyPassword'] ?: 'android'
            storeFile keystoreProperties['debug.storeFile'] ? file(keystoreProperties['debug.storeFile']) : file('debug.keystore')
            storePassword keystoreProperties['debug.storePassword'] ?: 'android'
        }
        release {
            keyAlias keystoreProperties['release.keyAlias'] ?: 'rwkvapp'
            keyPassword keystoreProperties['release.keyPassword'] ?: 'rwkvapp123'
            storeFile keystoreProperties['release.storeFile'] ? file(keystoreProperties['release.storeFile']) : file('release.keystore')
            storePassword keystoreProperties['release.storePassword'] ?: 'rwkvapp123'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
